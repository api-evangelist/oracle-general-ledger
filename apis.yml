  - name: Oracle General Ledger Accounting Period Status REST API
    description: >-
      REST API for viewing accounting period statuses in Oracle Fusion Cloud
      General Ledger. The accounting period status list of values resource
      provides period details in a calendar, including ledger identification,
      period name, and closing status values such as Open, Closed, Future
      Enterable, Never Opened, Permanently Closed, and Close Pending.
    image: https://www.oracle.com/a/ocom/img/oracle-logo.svg
    humanURL: https://docs.oracle.com/en/cloud/saas/financials/26a/farfa/index.html
    baseURL: https://{instance}.oraclecloud.com/fscmRestApi/resources/11.13.18.05
