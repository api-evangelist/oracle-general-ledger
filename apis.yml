  - name: Oracle General Ledger Ledger Balances REST API
    description: >-
      REST API for querying account balances in Oracle Fusion Cloud General
      Ledger. The ledger balances resource allows viewing balance amounts for any
      account combination or accounts defined as part of an account group.
      Supports finders for account balance by combination, account group balance,
      and primary key lookup across ledgers, currencies, and accounting periods.
    image: https://www.oracle.com/a/ocom/img/oracle-logo.svg
    humanURL: https://docs.oracle.com/en/cloud/saas/financials/26a/farfa/index.html
    baseURL: https://{instance}.oraclecloud.com/fscmRestApi/resources/11.13.18.05
