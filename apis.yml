apis:
  - name: Oracle General Ledger Journal Batches REST API
    description: >-
      REST API for managing journal batches in Oracle Fusion Cloud General Ledger.
      The journal batches resource allows viewing journal batches, updating batch
      completion status and reversal attributes, and deleting journal batches.
      Child resources provide access to journal headers, journal lines,
      attachments, action logs, descriptive flexfields, and error details.
    image: https://www.oracle.com/a/ocom/img/oracle-logo.svg
    humanURL: https://docs.oracle.com/en/cloud/saas/financials/26a/farfa/index.html
    baseURL: https://{instance}.oraclecloud.com/fscmRestApi/resources/11.13.18.05
    tags:
      - Accounting
      - General Ledger
      - Journal Batches
      - Journals
