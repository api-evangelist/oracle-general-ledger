  - name: Oracle General Ledger Chart of Accounts Filters REST API
    description: >-
      REST API for managing chart of accounts filter configurations in Oracle
      Fusion Cloud General Ledger. The chart of accounts filters resource returns
      filter ID values for chart of accounts filter criteria, enabling control
      over which account combinations are available for journal entry and
      financial reporting based on defined filter rules and criteria.
    image: https://www.oracle.com/a/ocom/img/oracle-logo.svg
    humanURL: https://docs.oracle.com/en/cloud/saas/financials/26a/farfa/index.html
