  - name: Oracle General Ledger Currency Rates REST API
    description: >-
      REST API for retrieving currency exchange rate information in Oracle Fusion
      Cloud General Ledger. The currency rates resource provides information on
      currency rates for source and target currency combinations, supporting
      daily rates, corporate rates, and user-defined rate types used in
      multi-currency accounting and foreign currency translation.
