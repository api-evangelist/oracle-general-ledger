  - name: Oracle Joint Venture General Ledger Transactions REST API
    description: >-
      REST API for managing joint venture general ledger transactions in Oracle
      Fusion Cloud Financials. The joint venture GL transactions and joint
      venture subledger transactions resources enable viewing and updating
      transactions related to joint venture accounting, supporting partnership
      accounting workflows that integrate with the general ledger.
    image: https://www.oracle.com/a/ocom/img/oracle-logo.svg
    humanURL: https://docs.oracle.com/en/cloud/saas/financials/26a/farfa/index.html
