  - name: Oracle Intercompany Transactions REST API
    description: >-
      REST API for managing intercompany transactions in Oracle Fusion Cloud
      Financials. The intercompany resources support agreement-based intercompany
      transactions, intercompany transaction source documents, intercompany
      agreements with transfer authorization groups, and intercompany
      organization lookups. These APIs enable automated cross-charge processing
      and intercompany balancing within the general ledger.
    image: https://www.oracle.com/a/ocom/img/oracle-logo.svg
    humanURL: https://docs.oracle.com/en/cloud/saas/financials/26a/farfa/index.html
    baseURL: https://{instance}.oraclecloud.com/fscmRestApi/resources/11.13.18.05
    tags:
