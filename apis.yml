  - name: Oracle General Ledger Ledger Options REST API
    description: >-
      REST API for accessing ledger configuration options in Oracle Fusion Cloud
      General Ledger. The ledger options resource provides access to ledger setup
      details including chart of accounts identifiers, balancing segment names,
      accounted period types, budgetary control settings, and document numbering
      configurations used to define how a ledger processes accounting data.
    image: https://www.oracle.com/a/ocom/img/oracle-logo.svg
    humanURL: https://docs.oracle.com/en/cloud/saas/financials/26a/farfa/index.html
    baseURL: https://{instance}.oraclecloud.com/fscmRestApi/resources/11.13.18.05
