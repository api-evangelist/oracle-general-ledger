  - name: Oracle General Ledger Budgetary Control REST API
    description: >-
      REST API for managing budgetary controls in Oracle Fusion Cloud General
      Ledger. The budgetary control resources enable viewing budget execution
      controls, budget impact results, and control budget periods. These APIs
      support organizations that use budget accounts to control expenditures
      against defined appropriation limits and enterprise performance management
      budget transactions.
    image: https://www.oracle.com/a/ocom/img/oracle-logo.svg
    humanURL: https://docs.oracle.com/en/cloud/saas/financials/26a/farfa/index.html
    baseURL: https://{instance}.oraclecloud.com/fscmRestApi/resources/11.13.18.05
