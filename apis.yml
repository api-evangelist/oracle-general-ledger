aid: oracle-general-ledger
name: Oracle General Ledger
description: >-
  Oracle Fusion Cloud General Ledger provides REST APIs for managing core
  financial accounting operations within Oracle Cloud ERP. These APIs enable
  programmatic access to journal entries, ledger balances, accounting periods,
  currency rates, intercompany transactions, budgetary controls, and chart of
  accounts configurations used by finance teams for enterprise accounting,
  reporting, and close processes.
type: Index
position: Consumer
access: 3rd-Party
