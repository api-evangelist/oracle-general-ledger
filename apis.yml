  - name: Oracle General Ledger ERP Integrations REST API
    description: >-
      REST API for automating bulk data import and export flows with Oracle
      Fusion Cloud General Ledger. The ERP integrations resource supports loading
      journal data files, submitting Enterprise Scheduler Service jobs for
      journal import, and running the accounting engine for subledger journal
      processing. Also provides access to ERP business events and ERP process
      status details.
    image: https://www.oracle.com/a/ocom/img/oracle-logo.svg
    humanURL: https://docs.oracle.com/en/cloud/saas/financials/26a/farfa/index.html
